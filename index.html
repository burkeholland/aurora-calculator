<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aurora Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.5s ease;
}

/* Animated Aurora Background */
.aurora-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #bfdbfe 0%, #d1fae5 40%, #fed7aa 70%, #bfdbfe 100%);
  background-size: 400% 400%;
  animation: auroraShift 12s ease-in-out infinite;
  transition: background 0.6s ease;
}

.aurora-bg::before {
  content: '';
  position: absolute;
  inset: -50%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(191, 219, 254, 0.6) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(209, 250, 229, 0.5) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(254, 215, 170, 0.5) 0%, transparent 50%),
    radial-gradient(ellipse at 40% 30%, rgba(2, 132, 199, 0.15) 0%, transparent 40%);
  animation: auroraOrbs 8s ease-in-out infinite alternate;
}

.aurora-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 70% 40%, rgba(255, 255, 255, 0.3) 0%, transparent 60%),
    radial-gradient(ellipse at 30% 70%, rgba(254, 215, 170, 0.2) 0%, transparent 50%);
  animation: shimmer 6s ease-in-out infinite alternate;
}

@keyframes auroraShift {
  0%, 100% { background-position: 0% 50%; }
  25% { background-position: 100% 50%; }
  50% { background-position: 100% 100%; }
  75% { background-position: 0% 100%; }
}

@keyframes auroraOrbs {
  0% { transform: translate(0, 0) rotate(0deg) scale(1); }
  100% { transform: translate(3%, -3%) rotate(5deg) scale(1.05); }
}

@keyframes shimmer {
  0% { opacity: 0.6; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.02); }
}

/* Dark Mode */
body.dark .aurora-bg {
  background: linear-gradient(135deg, #0c1929 0%, #0f2744 40%, #0c1929 70%, #111d32 100%);
}

body.dark .aurora-bg::before {
  background:
    radial-gradient(ellipse at 20% 50%, rgba(2, 132, 199, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(2, 132, 199, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(14, 165, 233, 0.08) 0%, transparent 50%);
}

body.dark .aurora-bg::after {
  background:
    radial-gradient(ellipse at 70% 40%, rgba(2, 132, 199, 0.1) 0%, transparent 60%),
    radial-gradient(ellipse at 30% 70%, rgba(14, 165, 233, 0.06) 0%, transparent 50%);
}

/* Calculator Container — Frosted Glass */
.calculator {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  padding: 28px 20px 20px;
  border-radius: 40px;
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid #cbd5e1;
  box-shadow:
    0 25px 60px rgba(12, 74, 110, 0.12),
    0 10px 30px rgba(0, 0, 0, 0.06),
    inset 0 1px 0 rgba(255, 255, 255, 0.6);
  transition: transform 0.1s ease, background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
  transform-style: preserve-3d;
  perspective: 1000px;
}

body.dark .calculator {
  background: rgba(12, 25, 41, 0.8);
  border-color: rgba(2, 132, 199, 0.3);
  box-shadow:
    0 25px 60px rgba(0, 0, 0, 0.4),
    0 10px 30px rgba(2, 132, 199, 0.1),
    inset 0 1px 0 rgba(2, 132, 199, 0.2);
}

/* Specular Highlight Overlay */
.specular-highlight {
  position: absolute;
  inset: 0;
  border-radius: 40px;
  pointer-events: none;
  opacity: 0.4;
  transition: opacity 0.3s ease;
  z-index: 10;
}

/* Dark Mode Toggle */
.dark-mode-toggle {
  position: absolute;
  top: 16px;
  right: 20px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  z-index: 20;
  transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.dark-mode-toggle:hover {
  transform: scale(1.1);
}

.dark-mode-toggle:active {
  transform: scale(0.95);
}

body.dark .dark-mode-toggle {
  background: rgba(2, 132, 199, 0.2);
  box-shadow: 0 2px 12px rgba(2, 132, 199, 0.3);
}

/* Display */
.display {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: 24px;
  padding: 20px 24px;
  margin-bottom: 20px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-end;
  border: 1px solid rgba(203, 213, 225, 0.6);
  overflow: hidden;
  box-shadow: inset 0 2px 8px rgba(12, 74, 110, 0.04);
  transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
}

body.dark .display {
  background: rgba(8, 18, 32, 0.7);
  border-color: rgba(2, 132, 199, 0.2);
  box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
}

.display .expression {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  font-weight: 400;
  color: #64748b;
  margin-bottom: 8px;
  min-height: 20px;
  text-align: right;
  width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: color 0.5s ease;
}

body.dark .display .expression {
  color: #64748b;
}

.display .current-wrapper {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  overflow: hidden;
  min-height: 58px;
}

.display .current {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 300;
  color: #0c4a6e;
  letter-spacing: -1.5px;
  text-align: right;
  white-space: nowrap;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  transition: color 0.5s ease;
  transform-origin: right center;
}

body.dark .display .current {
  color: #bfdbfe;
}

/* Odometer digit container */
.digit-slot {
  display: inline-block;
  overflow: hidden;
  height: 1.15em;
  vertical-align: bottom;
  position: relative;
}

.digit-slot .digit-roll {
  display: flex;
  flex-direction: column;
  transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
}

.digit-slot .digit-char {
  height: 1.15em;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Button Grid */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 12px;
}

/* Base Button Style */
.btn {
  aspect-ratio: 1;
  border: none;
  border-radius: 50%;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 20px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
              box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1),
              background 0.3s ease,
              color 0.3s ease,
              border-color 0.3s ease;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  overflow: hidden;
}

.btn:active {
  transform: scale(0.9);
}

@media (hover: hover) {
  .btn:hover {
    transform: scale(1.06);
  }
  .btn:hover:active {
    transform: scale(0.9);
  }
  .btn-number:hover {
    box-shadow: 0 6px 20px rgba(12, 74, 110, 0.12), 0 2px 6px rgba(0, 0, 0, 0.06),
                inset 1px 1px 0px rgba(255,255,255,0.6), inset -1px -1px 0px rgba(0,0,0,0.1);
    background: rgba(255, 255, 255, 0.95);
  }
  .btn-utility:hover {
    background: rgba(203, 213, 225, 0.95);
    box-shadow: 0 6px 20px rgba(3, 105, 161, 0.12),
                inset 1px 1px 0px rgba(255,255,255,0.6), inset -1px -1px 0px rgba(0,0,0,0.1);
  }
  .btn-operator:hover {
    box-shadow: 0 8px 24px rgba(2, 132, 199, 0.35), 0 2px 8px rgba(2, 132, 199, 0.2),
                inset 1px 1px 0px rgba(255,255,255,0.3), inset -1px -1px 0px rgba(0,0,0,0.15);
  }
  .btn-equals:hover {
    box-shadow: 0 8px 28px rgba(12, 74, 110, 0.4), 0 2px 8px rgba(12, 74, 110, 0.15),
                inset 1px 1px 0px rgba(255,255,255,0.3), inset -1px -1px 0px rgba(0,0,0,0.15);
  }
}

/* Number Buttons with bevel */
.btn-number {
  background: rgba(255, 255, 255, 0.85);
  color: #111827;
  box-shadow: inset 1px 1px 0px rgba(255,255,255,0.6), inset -1px -1px 0px rgba(0,0,0,0.1),
              0 4px 12px rgba(12, 74, 110, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
}

.btn-number:active {
  box-shadow: inset -1px -1px 0px rgba(255,255,255,0.6), inset 1px 1px 0px rgba(0,0,0,0.1),
              0 1px 4px rgba(12, 74, 110, 0.06);
}

body.dark .btn-number {
  background: rgba(15, 30, 50, 0.8);
  color: #e2e8f0;
  border: 1px solid rgba(2, 132, 199, 0.15);
  box-shadow: inset 1px 1px 0px rgba(2, 132, 199, 0.1), inset -1px -1px 0px rgba(0,0,0,0.3),
              0 4px 12px rgba(0, 0, 0, 0.3), 0 0 8px rgba(2, 132, 199, 0.05);
}

body.dark .btn-number:active {
  box-shadow: inset -1px -1px 0px rgba(2, 132, 199, 0.1), inset 1px 1px 0px rgba(0,0,0,0.3),
              0 1px 4px rgba(0, 0, 0, 0.2);
}

/* Utility Buttons */
.btn-utility {
  background: rgba(203, 213, 225, 0.8);
  color: #0369a1;
  box-shadow: inset 1px 1px 0px rgba(255,255,255,0.6), inset -1px -1px 0px rgba(0,0,0,0.1),
              0 4px 12px rgba(3, 105, 161, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
  font-weight: 600;
}

.btn-utility:active {
  box-shadow: inset -1px -1px 0px rgba(255,255,255,0.6), inset 1px 1px 0px rgba(0,0,0,0.1),
              0 1px 4px rgba(3, 105, 161, 0.06);
}

body.dark .btn-utility {
  background: rgba(2, 132, 199, 0.15);
  color: #7dd3fc;
  border: 1px solid rgba(2, 132, 199, 0.2);
  box-shadow: inset 1px 1px 0px rgba(2, 132, 199, 0.1), inset -1px -1px 0px rgba(0,0,0,0.3),
              0 4px 12px rgba(0, 0, 0, 0.3);
}

/* Operator Buttons */
.btn-operator {
  background: linear-gradient(135deg, #0284c7, #0369a1);
  color: #ffffff;
  box-shadow: inset 1px 1px 0px rgba(255,255,255,0.3), inset -1px -1px 0px rgba(0,0,0,0.15),
              0 6px 16px rgba(2, 132, 199, 0.25), 0 2px 6px rgba(0, 0, 0, 0.06);
}

.btn-operator:active {
  box-shadow: inset -1px -1px 0px rgba(255,255,255,0.3), inset 1px 1px 0px rgba(0,0,0,0.15),
              0 2px 6px rgba(2, 132, 199, 0.15);
}

.btn-operator.active {
  background: linear-gradient(135deg, #0369a1, #0c4a6e);
  box-shadow: 0 4px 20px rgba(12, 74, 110, 0.4), 0 0 12px rgba(2, 132, 199, 0.3),
              inset 1px 1px 0px rgba(255,255,255,0.2), inset -1px -1px 0px rgba(0,0,0,0.2);
}

body.dark .btn-operator {
  background: linear-gradient(135deg, #0284c7, #0ea5e9);
  box-shadow: inset 1px 1px 0px rgba(255,255,255,0.2), inset -1px -1px 0px rgba(0,0,0,0.2),
              0 6px 16px rgba(2, 132, 199, 0.4), 0 0 12px rgba(14, 165, 233, 0.2);
}

/* Equals Button */
.btn-equals {
  background: linear-gradient(135deg, #0c4a6e, #0284c7);
  color: #ffffff;
  font-size: 28px;
  font-weight: 600;
  box-shadow: inset 1px 1px 0px rgba(255,255,255,0.3), inset -1px -1px 0px rgba(0,0,0,0.15),
              0 8px 24px rgba(12, 74, 110, 0.3), 0 2px 8px rgba(0, 0, 0, 0.08);
}

.btn-equals:active {
  background: linear-gradient(135deg, #083344, #0369a1);
  box-shadow: inset -1px -1px 0px rgba(255,255,255,0.3), inset 1px 1px 0px rgba(0,0,0,0.15),
              0 2px 8px rgba(12, 74, 110, 0.2);
}

body.dark .btn-equals {
  background: linear-gradient(135deg, #0284c7, #38bdf8);
  box-shadow: inset 1px 1px 0px rgba(255,255,255,0.2), inset -1px -1px 0px rgba(0,0,0,0.2),
              0 8px 24px rgba(2, 132, 199, 0.5), 0 0 16px rgba(56, 189, 248, 0.3);
}

/* Zero Button — wide pill */
.btn-zero {
  border-radius: 32px;
  grid-column: span 2;
  aspect-ratio: auto;
  padding: 0 28px;
  justify-content: flex-start;
}

/* Decimal Button */
.btn-decimal {
  font-size: 24px;
  font-weight: 700;
}

/* Glow Ripple Effect */
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: radial-gradient(circle at center, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.btn:active::after {
  opacity: 1;
  transition: opacity 0s;
}

/* Iridescent Sheen Overlay */
.btn-sheen {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
  z-index: 2;
  mix-blend-mode: overlay;
}

.btn:hover .btn-sheen {
  opacity: 0.18;
}

/* Particle container */
.particle-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1000;
}

.particle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: particleBurst 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
}

@keyframes particleBurst {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(var(--tx), var(--ty)) scale(0.3);
  }
}

/* Card pulse animation */
@keyframes cardPulse {
  0% { transform: scale(1) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)); }
  40% { transform: scale(1.015) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)); }
  70% { transform: scale(0.997) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)); }
  100% { transform: scale(1) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)); }
}

.calculator.pulse {
  animation: cardPulse 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* Responsive */
@media (max-width: 420px) {
  .calculator {
    max-width: 100%;
    border-radius: 0;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 60px 16px 24px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .display {
    flex: 1;
    max-height: 180px;
    margin-bottom: 16px;
  }
  .buttons {
    gap: 10px;
  }
  .btn {
    font-size: 18px;
  }
}

@media (min-width: 421px) and (max-height: 700px) {
  .calculator {
    padding: 20px 16px 16px;
  }
  .display {
    min-height: 90px;
    padding: 14px 20px;
    margin-bottom: 14px;
  }
  .buttons {
    gap: 10px;
  }
}

/* Entry Animations */
.calculator {
  animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes floatIn {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.94);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.btn {
  animation: buttonIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.btn:nth-child(1) { animation-delay: 0.1s; }
.btn:nth-child(2) { animation-delay: 0.13s; }
.btn:nth-child(3) { animation-delay: 0.16s; }
.btn:nth-child(4) { animation-delay: 0.19s; }
.btn:nth-child(5) { animation-delay: 0.22s; }
.btn:nth-child(6) { animation-delay: 0.25s; }
.btn:nth-child(7) { animation-delay: 0.28s; }
.btn:nth-child(8) { animation-delay: 0.31s; }
.btn:nth-child(9) { animation-delay: 0.34s; }
.btn:nth-child(10) { animation-delay: 0.37s; }
.btn:nth-child(11) { animation-delay: 0.40s; }
.btn:nth-child(12) { animation-delay: 0.43s; }
.btn:nth-child(13) { animation-delay: 0.46s; }
.btn:nth-child(14) { animation-delay: 0.49s; }
.btn:nth-child(15) { animation-delay: 0.52s; }
.btn:nth-child(16) { animation-delay: 0.55s; }
.btn:nth-child(17) { animation-delay: 0.58s; }
.btn:nth-child(18) { animation-delay: 0.61s; }
.btn:nth-child(19) { animation-delay: 0.64s; }

@keyframes buttonIn {
  from {
    opacity: 0;
    transform: translateY(16px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}
</style>
</head>
<body>

<div class="aurora-bg"></div>
<div class="particle-container" id="particleContainer"></div>

<div class="calculator" id="calculator">
  <div class="specular-highlight" id="specularHighlight"></div>
  <button class="dark-mode-toggle" id="darkToggle" aria-label="Toggle dark mode">☀️</button>
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="current-wrapper">
      <div class="current" id="current">0</div>
    </div>
  </div>
  <div class="buttons">
    <button class="btn btn-utility" data-action="clear"><span class="btn-sheen"></span>AC</button>
    <button class="btn btn-utility" data-action="sign"><span class="btn-sheen"></span>±</button>
    <button class="btn btn-utility" data-action="percent"><span class="btn-sheen"></span>%</button>
    <button class="btn btn-operator" data-action="operator" data-value="÷"><span class="btn-sheen"></span>÷</button>

    <button class="btn btn-number" data-action="number" data-value="7"><span class="btn-sheen"></span>7</button>
    <button class="btn btn-number" data-action="number" data-value="8"><span class="btn-sheen"></span>8</button>
    <button class="btn btn-number" data-action="number" data-value="9"><span class="btn-sheen"></span>9</button>
    <button class="btn btn-operator" data-action="operator" data-value="×"><span class="btn-sheen"></span>×</button>

    <button class="btn btn-number" data-action="number" data-value="4"><span class="btn-sheen"></span>4</button>
    <button class="btn btn-number" data-action="number" data-value="5"><span class="btn-sheen"></span>5</button>
    <button class="btn btn-number" data-action="number" data-value="6"><span class="btn-sheen"></span>6</button>
    <button class="btn btn-operator" data-action="operator" data-value="−"><span class="btn-sheen"></span>−</button>

    <button class="btn btn-number" data-action="number" data-value="1"><span class="btn-sheen"></span>1</button>
    <button class="btn btn-number" data-action="number" data-value="2"><span class="btn-sheen"></span>2</button>
    <button class="btn btn-number" data-action="number" data-value="3"><span class="btn-sheen"></span>3</button>
    <button class="btn btn-operator" data-action="operator" data-value="+"><span class="btn-sheen"></span>+</button>

    <button class="btn btn-number btn-zero" data-action="number" data-value="0"><span class="btn-sheen"></span>0</button>
    <button class="btn btn-number btn-decimal" data-action="decimal"><span class="btn-sheen"></span>.</button>
    <button class="btn btn-equals" data-action="equals" id="equalsBtn"><span class="btn-sheen"></span>=</button>
  </div>
</div>

<script>
(() => {
  const display = document.getElementById('current');
  const expressionEl = document.getElementById('expression');
  const calculator = document.getElementById('calculator');
  const specularHighlight = document.getElementById('specularHighlight');
  const particleContainer = document.getElementById('particleContainer');
  const darkToggle = document.getElementById('darkToggle');
  const equalsBtn = document.getElementById('equalsBtn');

  let currentInput = '0';
  let previousInput = '';
  let operator = null;
  let shouldResetDisplay = false;
  let lastExpression = '';
  let prevDisplayText = '0';

  // ===== DARK MODE =====
  const savedTheme = localStorage.getItem('aurora-calc-theme');
  if (savedTheme === 'dark') {
    document.body.classList.add('dark');
    darkToggle.textContent = '🌙';
  }

  darkToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    darkToggle.textContent = isDark ? '🌙' : '☀️';
    localStorage.setItem('aurora-calc-theme', isDark ? 'dark' : 'light');
    playClick('utility');
  });

  // ===== WEB AUDIO CLICK SOUNDS =====
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClick(type) {
    try {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      oscillator.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(ctx.destination);

      filter.type = 'bandpass';
      filter.frequency.value = type === 'equals' ? 1800 : type === 'operator' ? 2200 : 3000;
      filter.Q.value = 2;

      oscillator.type = 'square';
      const baseFreq = type === 'equals' ? 600 : type === 'operator' ? 800 : 1200;
      oscillator.frequency.setValueAtTime(baseFreq, ctx.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, ctx.currentTime + 0.03);

      gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);

      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + 0.06);
    } catch (e) {}
  }

  // ===== 3D TILT =====
  let tiltActive = false;
  calculator.addEventListener('mouseenter', () => { tiltActive = true; });
  calculator.addEventListener('mouseleave', () => {
    tiltActive = false;
    calculator.style.transform = 'rotateX(0deg) rotateY(0deg)';
    calculator.style.setProperty('--rx', '0deg');
    calculator.style.setProperty('--ry', '0deg');
    specularHighlight.style.background = 'none';
  });

  calculator.addEventListener('mousemove', (e) => {
    if (!tiltActive) return;
    const rect = calculator.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    const tiltX = (0.5 - y) * 12; // max 12deg
    const tiltY = (x - 0.5) * 12;
    calculator.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
    calculator.style.setProperty('--rx', `${tiltX}deg`);
    calculator.style.setProperty('--ry', `${tiltY}deg`);

    // Specular highlight moves opposite
    const hx = (1 - x) * 100;
    const hy = (1 - y) * 100;
    specularHighlight.style.background = `radial-gradient(circle at ${hx}% ${hy}%, rgba(255,255,255,0.35) 0%, transparent 60%)`;
  });

  // ===== IRIDESCENT BUTTON SHEEN =====
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('mousemove', (e) => {
      const sheen = btn.querySelector('.btn-sheen');
      if (!sheen) return;
      const rect = btn.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      sheen.style.background = `conic-gradient(from ${x * 3.6}deg at ${x}% ${y}%, 
        rgba(2,132,199,0.4), rgba(217,119,6,0.4), rgba(77,124,15,0.4), 
        rgba(194,65,12,0.4), rgba(2,132,199,0.4))`;
    });

    btn.addEventListener('mouseleave', () => {
      const sheen = btn.querySelector('.btn-sheen');
      if (sheen) sheen.style.background = 'none';
    });
  });

  // ===== PARTICLE BURST =====
  const particleColors = ['#0284c7', '#d97706', '#4d7c0f', '#c2410c'];

  function emitParticles() {
    const rect = equalsBtn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const size = 3 + Math.random() * 3;
      const angle = (Math.PI * 2 * i) / 20 + (Math.random() - 0.5) * 0.5;
      const distance = 50 + Math.random() * 80;
      const tx = Math.cos(angle) * distance;
      const ty = Math.sin(angle) * distance;

      particle.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${cx - size/2}px; top: ${cy - size/2}px;
        background: ${particleColors[i % particleColors.length]};
        --tx: ${tx}px; --ty: ${ty}px;
      `;
      particleContainer.appendChild(particle);
      setTimeout(() => particle.remove(), 600);
    }
  }

  // ===== CARD PULSE =====
  function pulseCard() {
    calculator.classList.remove('pulse');
    void calculator.offsetWidth; // reflow
    calculator.classList.add('pulse');
    setTimeout(() => calculator.classList.remove('pulse'), 300);
  }

  // ===== DYNAMIC DISPLAY SCALING =====
  function scaleDisplay() {
    const wrapper = display.parentElement;
    const wrapperWidth = wrapper.clientWidth;
    const text = display.textContent || display.innerText;
    
    // Reset to measure natural width
    display.style.fontSize = '52px';
    display.style.transform = 'none';
    
    // Measure with a temp span
    const tempSpan = document.createElement('span');
    tempSpan.style.cssText = `
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 52px;
      letter-spacing: -1.5px;
      visibility: hidden;
      position: absolute;
      white-space: nowrap;
    `;
    tempSpan.textContent = text;
    document.body.appendChild(tempSpan);
    const textWidth = tempSpan.offsetWidth;
    document.body.removeChild(tempSpan);

    if (textWidth > wrapperWidth - 10) {
      const scale = (wrapperWidth - 10) / textWidth;
      display.style.fontSize = `${Math.max(20, 52 * scale)}px`;
    }
  }

  // ===== ODOMETER ANIMATION =====
  function renderOdometer(newText) {
    const oldText = prevDisplayText;
    prevDisplayText = newText;
    
    // Pad strings for comparison
    const maxLen = Math.max(oldText.length, newText.length);
    const oldPad = oldText.padStart(maxLen);
    const newPad = newText.padStart(maxLen);
    
    let html = '';
    for (let i = 0; i < newText.length; i++) {
      const ch = newText[i];
      const oldIdx = i - (newText.length - oldText.length);
      const oldCh = oldIdx >= 0 && oldIdx < oldText.length ? oldText[oldIdx] : '';
      
      if (/[0-9]/.test(ch) && /[0-9]/.test(oldCh) && ch !== oldCh) {
        const oldNum = parseInt(oldCh);
        const newNum = parseInt(ch);
        const goingUp = newNum > oldNum;
        const offset = goingUp ? '-1.15em' : '0em';
        const startOffset = goingUp ? '0em' : '-1.15em';
        html += `<span class="digit-slot"><span class="digit-roll" style="transform: translateY(${startOffset})" data-target="${offset}">`;
        if (goingUp) {
          html += `<span class="digit-char">${oldCh}</span><span class="digit-char">${ch}</span>`;
        } else {
          html += `<span class="digit-char">${ch}</span><span class="digit-char">${oldCh}</span>`;
        }
        html += `</span></span>`;
      } else {
        html += `<span class="digit-slot"><span class="digit-roll"><span class="digit-char">${ch}</span></span></span>`;
      }
    }
    
    display.innerHTML = html;
    
    // Trigger animations after frame
    requestAnimationFrame(() => {
      display.querySelectorAll('.digit-roll[data-target]').forEach(roll => {
        roll.style.transform = `translateY(${roll.dataset.target})`;
      });
    });

    scaleDisplay();
  }

  // ===== CALCULATOR LOGIC =====
  function formatNumber(num) {
    if (num === 'Error') return 'Error';
    const n = parseFloat(num);
    if (isNaN(n)) return '0';
    if (num.includes('.') && num.endsWith('.')) return num;
    if (num.includes('.') && num.endsWith('0') && !shouldResetDisplay) return num;
    if (Math.abs(n) > 999999999) return n.toExponential(4);
    const parts = num.split('.');
    parts[0] = parseInt(parts[0]).toLocaleString('en-US');
    return parts.join('.');
  }

  function updateDisplay() {
    const formatted = formatNumber(currentInput);
    renderOdometer(formatted);
    expressionEl.textContent = lastExpression;
  }

  function clearActiveOperators() {
    document.querySelectorAll('.btn-operator').forEach(b => b.classList.remove('active'));
  }

  function highlightOperator(op) {
    clearActiveOperators();
    const map = { '+': '+', '−': '−', '×': '×', '÷': '÷' };
    const symbol = map[op] || op;
    document.querySelectorAll('.btn-operator').forEach(b => {
      if (b.dataset.value === symbol) b.classList.add('active');
    });
  }

  function inputNumber(num) {
    if (shouldResetDisplay) {
      currentInput = num;
      shouldResetDisplay = false;
    } else {
      if (currentInput === '0' && num !== '.') {
        currentInput = num;
      } else {
        if (currentInput.replace(/[^0-9]/g, '').length >= 12) return;
        currentInput += num;
      }
    }
    clearActiveOperators();
    updateDisplay();
  }

  function inputDecimal() {
    if (shouldResetDisplay) {
      currentInput = '0.';
      shouldResetDisplay = false;
    } else if (!currentInput.includes('.')) {
      currentInput += '.';
    }
    clearActiveOperators();
    updateDisplay();
  }

  function inputOperator(op) {
    if (operator && !shouldResetDisplay) {
      calculate(true);
    }
    previousInput = currentInput;
    operator = op;
    shouldResetDisplay = true;
    lastExpression = `${formatNumber(previousInput)} ${op}`;
    highlightOperator(op);
    updateDisplay();
  }

  function calculate(silent) {
    if (!operator || previousInput === '') return;
    const prev = parseFloat(previousInput);
    const curr = parseFloat(currentInput);
    let result;

    switch (operator) {
      case '+': result = prev + curr; break;
      case '−': result = prev - curr; break;
      case '×': result = prev * curr; break;
      case '÷':
        if (curr === 0) {
          currentInput = 'Error';
          lastExpression = `${formatNumber(previousInput)} ÷ 0`;
          operator = null;
          previousInput = '';
          shouldResetDisplay = true;
          updateDisplay();
          if (!silent) { emitParticles(); }
          return;
        }
        result = prev / curr;
        break;
      default: return;
    }

    lastExpression = `${formatNumber(previousInput)} ${operator} ${formatNumber(currentInput)}`;
    result = parseFloat(result.toPrecision(12));
    currentInput = String(result);
    operator = null;
    previousInput = '';
    shouldResetDisplay = true;
    clearActiveOperators();
    updateDisplay();

    if (!silent) {
      emitParticles();
    }
  }

  function clear() {
    currentInput = '0';
    previousInput = '';
    operator = null;
    shouldResetDisplay = false;
    lastExpression = '';
    clearActiveOperators();
    updateDisplay();
  }

  function toggleSign() {
    if (currentInput === '0' || currentInput === 'Error') return;
    if (currentInput.startsWith('-')) {
      currentInput = currentInput.slice(1);
    } else {
      currentInput = '-' + currentInput;
    }
    updateDisplay();
  }

  function percent() {
    const num = parseFloat(currentInput);
    if (isNaN(num)) return;
    currentInput = String(parseFloat((num / 100).toPrecision(12)));
    updateDisplay();
  }

  function backspace() {
    if (shouldResetDisplay || currentInput === 'Error') {
      clear();
      return;
    }
    if (currentInput.length <= 1 || (currentInput.length === 2 && currentInput.startsWith('-'))) {
      currentInput = '0';
    } else {
      currentInput = currentInput.slice(0, -1);
    }
    updateDisplay();
  }

  // ===== EVENT HANDLERS =====
  document.querySelector('.buttons').addEventListener('click', (e) => {
    const btn = e.target.closest('.btn');
    if (!btn) return;

    const action = btn.dataset.action;
    const value = btn.dataset.value;

    // Determine click sound type
    if (action === 'equals') playClick('equals');
    else if (action === 'operator') playClick('operator');
    else playClick('number');

    switch (action) {
      case 'number': inputNumber(value); break;
      case 'decimal': inputDecimal(); break;
      case 'operator': inputOperator(value); break;
      case 'equals': calculate(false); break;
      case 'clear': clear(); break;
      case 'sign': toggleSign(); break;
      case 'percent': percent(); break;
    }
  });

  document.addEventListener('keydown', (e) => {
    e.preventDefault();
    const key = e.key;

    if (/^[0-9]$/.test(key)) { playClick('number'); inputNumber(key); }
    else if (key === '.') { playClick('number'); inputDecimal(); }
    else if (key === '+') { playClick('operator'); inputOperator('+'); }
    else if (key === '-') { playClick('operator'); inputOperator('−'); }
    else if (key === '*') { playClick('operator'); inputOperator('×'); }
    else if (key === '/') { playClick('operator'); inputOperator('÷'); }
    else if (key === 'Enter' || key === '=') { playClick('equals'); calculate(false); }
    else if (key === 'Escape') { playClick('utility'); clear(); }
    else if (key === 'Backspace') { playClick('number'); backspace(); }
    else if (key === '%') { playClick('utility'); percent(); }
  });

  updateDisplay();
})();
</script>
</body>
</html>
